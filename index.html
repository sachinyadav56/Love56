<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oye Khabbuu</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9ecf,#ffb6d9,#ffd1e6);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    position: relative;
    z-index: 2;
}

.name{
    font-size:36px;
    color:white;
    font-weight:bold;
    margin-bottom:10px;
}

.question{
    font-size:28px;
    color:white;
    margin-bottom:25px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

.yes{
    background:#ff2e7a;
    color:white;
}

.no{
    background:white;
    color:#ff2e7a;
}

.result{
    margin-top:20px;
    font-size:22px;
    color:white;
    font-weight:bold;
}

/* IMAGE BOX */
.image-box{
    display:none;
    position:relative;
    margin-top:25px;
    width:320px;
    margin-left:auto;
    margin-right:auto;
}

.image-box img{
    width:100%;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* TEXT OVER IMAGE */
.image-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:2px 2px 8px rgba(0,0,0,0.8);
    text-align:center;
    width:90%;
}
</style>
</head>

<body>

<div class="container">

    <div class="name">Ammuu❤️</div>
    <div class="question">Will you be my Constant❤️🌍🤞</div>

    <button class="yes" onclick="yesClick()">Yes🤩</button>
    <button class="no" id="noBtn">No☹️</button>

    <div class="result" id="result"></div>

    <!-- IMAGE WITH TEXT -->
    <div class="image-box" id="imageBox">
        <img src="ss56.png" alt="Love Image">
        <div class="image-text">I Love You Amuuddi ❤️🌍🤞</div>
    </div>

</div>

<!-- MUSIC -->
<audio id="loveMusic">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let moveCount = 0;
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);

function moveButton(){
    if(moveCount < 5){
        const bodyWidth = window.innerWidth;
        const bodyHeight = window.innerHeight;

        const randomX = Math.random() * (bodyWidth - 100);
        const randomY = Math.random() * (bodyHeight - 50);

        noBtn.style.position = "absolute";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";

        moveCount++;
    } else {
        noBtn.onclick = function(){
            document.getElementById("result").innerHTML =
            "Single rehna hai kya Butaki😜";
        }
    }
}

function yesClick(){
    document.getElementById("result").innerHTML =
    "Thank you so much, I love you Amuuddi🤩❤️";

    // play music
    document.getElementById("loveMusic").play();

    // show image
    document.getElementById("imageBox").style.display = "block";
}
</script>

</body>
</html>
