<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oye Khabbuu</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9ecf,#ffb6d9,#ffd1e6);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

.banner{
    background:#ff2e7a;
    color:white;
    padding:12px 25px;
    border-radius:15px;
    font-size:26px;
    font-weight:bold;
    margin-bottom:15px;
}

.name{
    font-size:36px;
    color:white;
    font-weight:bold;
}

.question{
    font-size:28px;
    color:white;
    margin-bottom:25px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}

.yes{
    background:#ff2e7a;
    color:white;
}

.no{
    background:white;
    color:#ff2e7a;
}

.result{
    margin-top:20px;
    font-size:22px;
    color:white;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">


<div class="name">Ammuu❤️</div>

<div class="question">Will you be my Constant❤️🌍🤞</div>

<button class="yes" onclick="yesClick()">Yes🤩</button>
<button class="no" id="noBtn">No☹️</button>

<div class="result" id="result"></div>

</div>
<!-- MUSIC -->
<audio id="loveMusic">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let moveCount = 0;
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);

function moveButton(){

    if(moveCount < 5){

        const bodyWidth = window.innerWidth;
        const bodyHeight = window.innerHeight;

        const randomX = Math.random() * (bodyWidth - 100);
        const randomY = Math.random() * (bodyHeight - 50);

        noBtn.style.position = "absolute";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";

        moveCount++;

    }else{

        noBtn.onclick = function(){
            document.getElementById("result").innerHTML =
            "Single rehna hai kya Butaki😜";
        }

    }
}

function yesClick(){

    document.getElementById("result").innerHTML =
     "Thank you so much, I love you Amuuddi🤩❤️";

    // PLAY MUSIC
    document.getElementById("loveMusic").play();

}

</script>


</body>
</html>
